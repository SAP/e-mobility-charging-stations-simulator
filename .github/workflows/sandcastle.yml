# Cutover note (one-time, can be removed after the first post-rename run):
# The previous setup used label `sandcastle` and branch prefix `agent/issue`.
# Before the first run on the new naming, the operator MUST:
#   1. Rename the GitHub label:
#      gh label edit sandcastle --name sandcastle-implement
#   2. Close or merge any open PR whose head branch starts with `agent/issue-`,
#      since the new pattern `agent/<key>-<n>-` does not match legacy branches
#      and they are no longer recognised as covering an issue (which would
#      otherwise produce duplicate PRs on the next nightly).

name: Sandcastle

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: sandcastle
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  sandcastle:
    runs-on: ubuntu-latest
    timeout-minutes: 540
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Validate secrets
        run: |
          if [ -z "$PI_AUTH_CONTENT" ]; then
            echo "::error::PI_AUTH_CONTENT secret is not configured"
            exit 1
          fi
          if [ -z "$OPENCODE_AUTH_CONTENT" ]; then
            echo "::error::OPENCODE_AUTH_CONTENT secret is not configured"
            exit 1
          fi
        env:
          PI_AUTH_CONTENT: ${{ secrets.PI_AUTH_CONTENT }}
          OPENCODE_AUTH_CONTENT: ${{ secrets.OPENCODE_AUTH_CONTENT }}

      - run: docker build -t sandcastle-sandbox .sandcastle/

      - name: Create sandbox env
        run: |
          printf 'GH_TOKEN=%s\n' "$GH_TOKEN" > .sandcastle/.env
          printf 'GITHUB_TOKEN=%s\n' "$GITHUB_TOKEN" >> .sandcastle/.env
          printf 'PI_AUTH_CONTENT=%s\n' "$PI_AUTH_CONTENT" >> .sandcastle/.env
          printf 'OPENCODE_AUTH_CONTENT=%s\n' "$OPENCODE_AUTH_CONTENT" >> .sandcastle/.env
        env:
          GH_TOKEN: ${{ github.token }}
          PI_AUTH_CONTENT: ${{ secrets.PI_AUTH_CONTENT }}
          OPENCODE_AUTH_CONTENT: ${{ secrets.OPENCODE_AUTH_CONTENT }}

      - run: pnpm run sandcastle
        env:
          GH_TOKEN: ${{ github.token }}
